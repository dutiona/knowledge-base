name: CI

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install system deps (tesseract OCR for image-ref test)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - name: Sync dependencies
        run: uv sync
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Pytest (fast suite)
        run: uv run pytest -q -m "not slow"
      - name: Sync all groups (type-check needs optional deps)
        run: uv sync --all-groups
      - name: Type-check (basedpyright)
        run: uv run basedpyright src/ tests/
